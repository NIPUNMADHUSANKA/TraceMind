name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.25.x
      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code
      - name: Run tests
        run: go test ./... -v